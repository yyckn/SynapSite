<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynapSite</title>
    <style>
        @font-face {
            font-family: 'MiSans';
            src: url('https://cdn.jsdelivr.net/gh/TrionesType/misans@latest/Web/Woff2/MiSans-Semibold.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'MiSans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            position: relative;
            z-index: 10;
        }

        .title {
            font-family: 'MiSans', sans-serif;
            font-size: 8rem; 
            font-weight: 600;
            letter-spacing: 0em;
            text-align: center;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7, #ff006e, #00d4ff);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 4s ease infinite, fadeInUp 1.2s ease-out;
            position: relative;
        }

        .title::after {
            content: 'Synap';
            position: absolute;
            left: 0;
            top: 0;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7, #ff006e, #00d4ff);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: blur(30px);
            opacity: 0.6;
            animation: gradientShift 4s ease infinite, pulse 2s ease-in-out infinite;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.2rem;
            letter-spacing: 1em;
            margin-top: 1rem;
            margin-bottom: 3rem;
            animation: fadeInUp 1.2s ease-out 0.3s both;
        }

        .hero-buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1.5rem;
            animation: fadeInUp 1.2s ease-out 0.5s both;
        }

        .hero-btn {
            font-family: 'MiSans', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .hero-btn-primary {
            background: linear-gradient(135deg, #7b2ff7, #00d4ff);
            color: #fff;
            border: none;
            box-shadow: 0 4px 20px rgba(123, 47, 247, 0.3);
        }

        .hero-btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(123, 47, 247, 0.5);
        }

        .hero-btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .hero-btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            transform: translateY(-3px);
            border-color: rgba(123, 47, 247, 0.5);
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { filter: blur(30px); opacity: 0.6; }
            50% { filter: blur(50px); opacity: 0.8; }
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            animation: float linear infinite;
            opacity: 0;
        }

        @keyframes float {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0);
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) scale(1);
            }
        }

        .orbit {
            position: absolute;
            border: 1px solid rgba(123, 47, 247, 0.2);
            border-radius: 50%;
            animation: rotate linear infinite;
        }

        .orbit:nth-child(1) {
            width: 300px;
            height: 300px;
            top: -150px;
            left: -150px;
            animation-duration: 8s;
        }

        .orbit:nth-child(2) {
            width: 500px;
            height: 500px;
            top: -250px;
            left: -250px;
            animation-duration: 12s;
            animation-direction: reverse;
        }

        .orbit:nth-child(3) {
            width: 700px;
            height: 700px;
            top: -350px;
            left: -350px;
            animation-duration: 16s;
        }

        .orbit::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: #7b2ff7;
            border-radius: 50%;
            top: -4px;
            left: 50%;
            box-shadow: 0 0 20px #7b2ff7, 0 0 40px #7b2ff7;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(60px); }
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 1.5rem 3rem;
            background: linear-gradient(180deg, rgba(10, 10, 10, 0.9) 0%, transparent 100%);
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .nav-btn {
            font-family: 'MiSans', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.7);
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 0.6rem 1.6rem;
            margin-left: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(123, 47, 247, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .nav-btn:hover {
            color: #fff;
            border-color: rgba(123, 47, 247, 0.6);
            box-shadow: 0 0 20px rgba(123, 47, 247, 0.3), inset 0 0 20px rgba(123, 47, 247, 0.1);
        }

        .nav-btn:hover::before {
            left: 100%;
        }

        .nav-btn.primary {
            background: linear-gradient(135deg, rgba(123, 47, 247, 0.4), rgba(0, 212, 255, 0.4));
            border-color: rgba(123, 47, 247, 0.5);
        }

        .nav-btn.primary:hover {
            background: linear-gradient(135deg, rgba(123, 47, 247, 0.6), rgba(0, 212, 255, 0.6));
            box-shadow: 0 0 30px rgba(123, 47, 247, 0.4), 0 0 60px rgba(0, 212, 255, 0.2);
        }

        .theme-toggle {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 100;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.7);
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(123, 47, 247, 0.5);
            transform: scale(1.1);
        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
        }

        .theme-toggle .sun { display: none; }
        .theme-toggle .moon { display: block; }

        [data-theme="light"] .theme-toggle .sun { display: block; }
        [data-theme="light"] .theme-toggle .moon { display: none; }

        [data-theme="light"] body {
            background: #ffffff;
        }

        [data-theme="light"] .subtitle {
            color: rgba(0, 0, 0, 0.5);
        }

        [data-theme="light"] .hero-btn-secondary {
            background: rgba(0, 0, 0, 0.05);
            color: rgba(0, 0, 0, 0.8);
            border-color: rgba(0, 0, 0, 0.15);
        }

        [data-theme="light"] .hero-btn-secondary:hover {
            background: rgba(0, 0, 0, 0.08);
            color: rgba(0, 0, 0, 0.9);
            border-color: rgba(123, 47, 247, 0.5);
        }

        [data-theme="light"] .grid-overlay {
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
        }

        [data-theme="light"] .orbit {
            border-color: rgba(123, 47, 247, 0.15);
        }

        [data-theme="light"] .orbit::after {
            background: #7b2ff7;
            box-shadow: 0 0 15px rgba(123, 47, 247, 0.5), 0 0 30px rgba(123, 47, 247, 0.3);
        }

        [data-theme="light"] .particle {
            opacity: 0.3;
        }

        [data-theme="light"] .title::after {
            filter: blur(40px);
            opacity: 0.3;
        }

        [data-theme="light"] .theme-toggle {
            background: rgba(0, 0, 0, 0.05);
            border-color: rgba(0, 0, 0, 0.12);
            color: rgba(0, 0, 0, 0.6);
        }

        [data-theme="light"] .theme-toggle:hover {
            background: rgba(0, 0, 0, 0.08);
            border-color: rgba(123, 47, 247, 0.5);
        }

        @media (prefers-color-scheme: light) {
            :root:not([data-theme="dark"]) body {
                background: #ffffff;
            }

            :root:not([data-theme="dark"]) .subtitle {
                color: rgba(0, 0, 0, 0.5);
            }

            :root:not([data-theme="dark"]) .hero-btn-secondary {
                background: rgba(0, 0, 0, 0.05);
                color: rgba(0, 0, 0, 0.8);
                border-color: rgba(0, 0, 0, 0.15);
            }

            :root:not([data-theme="dark"]) .hero-btn-secondary:hover {
                background: rgba(0, 0, 0, 0.08);
                color: rgba(0, 0, 0, 0.9);
                border-color: rgba(123, 47, 247, 0.5);
            }

            :root:not([data-theme="dark"]) .grid-overlay {
                background-image: 
                    linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            }

            :root:not([data-theme="dark"]) .orbit {
                border-color: rgba(123, 47, 247, 0.15);
            }

            :root:not([data-theme="dark"]) .orbit::after {
                box-shadow: 0 0 15px rgba(123, 47, 247, 0.5), 0 0 30px rgba(123, 47, 247, 0.3);
            }

            :root:not([data-theme="dark"]) .particle {
                opacity: 0.3;
            }

            :root:not([data-theme="dark"]) .title::after {
                filter: blur(40px);
                opacity: 0.3;
            }

            :root:not([data-theme="dark"]) .theme-toggle .sun { display: none; }
            :root:not([data-theme="dark"]) .theme-toggle .moon { display: block; }
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    
    <div class="orbit-container">
        <div class="orbit"></div>
        <div class="orbit"></div>
        <div class="orbit"></div>
    </div>

    <div class="container">
        <div class="title">Synap</div>
        <div class="subtitle">捕捉灵感 快如闪电</div>
        <div class="hero-buttons">
            <a href="download.html" class="hero-btn hero-btn-primary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                立即下载
            </a>
            <a href="document.html" class="hero-btn hero-btn-secondary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>

            </a>

                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">

        </div>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>

    <script>
        function createParticles() {
            const body = document.body;
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.animationDuration = (Math.random() * 10 + 5) + 's';
                particle.style.animationDelay = (Math.random() * 10) + 's';
                particle.style.width = particle.style.height = (Math.random() * 4 + 2) + 'px';
                
                const colors = ['#00d4ff', '#7b2ff7', '#ff006e'];
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.boxShadow = `0 0 10px ${particle.style.background}`;
                
                body.appendChild(particle);
            }
        }

        createParticles();

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        }

        initTheme();
    </script>
</body>
</html>
