<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synap - 文档</title>
    <style>
        @font-face {
            font-family: 'MiSans';
            src: url('https://cdn.jsdelivr.net/gh/TrionesType/misans@latest/Web/Woff2/MiSans-Semibold.woff2') format('woff2');
            font-weight: 600;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'MiSans';
            src: url('https://cdn.jsdelivr.net/gh/TrionesType/misans@latest/Web/Woff2/MiSans-Regular.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #0a0a0a;
            font-family: 'MiSans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            text-decoration: none;
        }

        .nav-btns {
            display: flex;
            gap: 1rem;
        }

        .nav-btn {
            font-family: 'MiSans', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 0.6rem 1.6rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .nav-btn:hover {
            color: #fff;
            border-color: rgba(123, 47, 247, 0.6);
            box-shadow: 0 0 20px rgba(123, 47, 247, 0.3);
        }

        .nav-btn.active {
            background: linear-gradient(135deg, rgba(123, 47, 247, 0.4), rgba(0, 212, 255, 0.4));
            border-color: rgba(123, 47, 247, 0.5);
        }

        .layout {
            display: flex;
            padding-top: 4rem;
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            top: 4rem;
            left: 0;
            width: 280px;
            height: calc(100vh - 4rem);
            background: rgba(255, 255, 255, 0.02);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            padding: 2rem 1.5rem;
            overflow-y: auto;
            animation: fadeInLeft 0.5s ease-out;
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .sidebar-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .sidebar-nav {
            list-style: none;
        }

        .sidebar-nav li {
            margin-bottom: 0.25rem;
        }

        .sidebar-nav a {
            display: block;
            padding: 0.6rem 1rem;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .sidebar-nav a:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .sidebar-nav a.active {
            background: linear-gradient(135deg, rgba(123, 47, 247, 0.2), rgba(0, 212, 255, 0.2));
            color: #fff;
        }

        .content {
            flex: 1;
            margin-left: 280px;
            padding: 3rem 4rem;
            max-width: 900px;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .markdown-body h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            background: linear-gradient(90deg, #00d4ff, #7b2ff7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .markdown-body h2 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            color: #fff;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .markdown-body h3 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-top: 2rem;
            margin-bottom: 0.75rem;
            color: rgba(255, 255, 255, 0.9);
        }

        .markdown-body h4 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            color: rgba(255, 255, 255, 0.85);
        }

        .markdown-body p {
            font-size: 1.05rem;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 1.25rem;
        }

        .markdown-body ul, .markdown-body ol {
            margin-bottom: 1.25rem;
            padding-left: 1.5rem;
        }

        .markdown-body li {
            font-size: 1.05rem;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 0.5rem;
        }

        .markdown-body code {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            background: rgba(123, 47, 247, 0.15);
            color: #c084fc;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .markdown-body pre {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            overflow-x: auto;
        }

        .markdown-body pre code {
            background: transparent;
            padding: 0;
            color: rgba(255, 255, 255, 0.8);
        }

        .markdown-body blockquote {
            border-left: 3px solid #7b2ff7;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            background: rgba(123, 47, 247, 0.05);
            border-radius: 0 8px 8px 0;
        }

        .markdown-body blockquote p {
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 0;
        }

        .markdown-body a {
            color: #00d4ff;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s ease;
        }

        .markdown-body a:hover {
            border-bottom-color: #00d4ff;
        }

        .markdown-body strong {
            color: #fff;
            font-weight: 600;
        }

        .markdown-body hr {
            border: none;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
            margin: 2rem 0;
        }

        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
        }

        .markdown-body th, .markdown-body td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .markdown-body th {
            font-weight: 600;
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
        }

        .markdown-body td {
            color: rgba(255, 255, 255, 0.7);
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .error {
            text-align: center;
            padding: 3rem;
            color: #ff006e;
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        @media (max-width: 1024px) {
            .sidebar {
                display: none;
            }

            .content {
                margin-left: 0;
                padding: 2rem 1.5rem;
            }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 1rem 1.5rem;
            }

            .markdown-body h1 {
                font-size: 2rem;
            }

            .markdown-body h2 {
                font-size: 1.5rem;
            }
        }

        .theme-toggle {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 100;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.7);
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(123, 47, 247, 0.5);
            transform: scale(1.1);
        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
        }

        .theme-toggle .sun { display: none; }
        .theme-toggle .moon { display: block; }

        [data-theme="light"] .theme-toggle .sun { display: block; }
        [data-theme="light"] .theme-toggle .moon { display: none; }

        [data-theme="light"] body {
            background: #ffffff;
            color: #1a1a1a;
        }

        [data-theme="light"] .navbar {
            background: rgba(255, 255, 255, 0.95);
            border-bottom-color: rgba(0, 0, 0, 0.08);
        }

        [data-theme="light"] .nav-btn {
            color: rgba(0, 0, 0, 0.6);
            border-color: rgba(0, 0, 0, 0.12);
        }

        [data-theme="light"] .nav-btn:hover {
            color: #1a1a1a;
            border-color: rgba(123, 47, 247, 0.5);
        }

        [data-theme="light"] .sidebar {
            background: rgba(0, 0, 0, 0.02);
            border-right-color: rgba(0, 0, 0, 0.08);
        }

        [data-theme="light"] .sidebar-title {
            color: rgba(0, 0, 0, 0.4);
        }

        [data-theme="light"] .sidebar-nav a {
            color: rgba(0, 0, 0, 0.6);
        }

        [data-theme="light"] .sidebar-nav a:hover {
            background: rgba(0, 0, 0, 0.05);
            color: #1a1a1a;
        }

        [data-theme="light"] .markdown-body h2 {
            color: #1a1a1a;
            border-bottom-color: rgba(0, 0, 0, 0.08);
        }

        [data-theme="light"] .markdown-body h3 {
            color: rgba(0, 0, 0, 0.9);
        }

        [data-theme="light"] .markdown-body h4 {
            color: rgba(0, 0, 0, 0.85);
        }

        [data-theme="light"] .markdown-body p {
            color: rgba(0, 0, 0, 0.7);
        }

        [data-theme="light"] .markdown-body li {
            color: rgba(0, 0, 0, 0.7);
        }

        [data-theme="light"] .markdown-body code {
            background: rgba(123, 47, 247, 0.1);
            color: #7b2ff7;
        }

        [data-theme="light"] .markdown-body pre {
            background: rgba(0, 0, 0, 0.03);
            border-color: rgba(0, 0, 0, 0.08);
        }

        [data-theme="light"] .markdown-body pre code {
            color: rgba(0, 0, 0, 0.8);
        }

        [data-theme="light"] .markdown-body blockquote {
            background: rgba(123, 47, 247, 0.05);
        }

        [data-theme="light"] .markdown-body blockquote p {
            color: rgba(0, 0, 0, 0.8);
        }

        [data-theme="light"] .markdown-body strong {
            color: #1a1a1a;
        }

        [data-theme="light"] .markdown-body hr {
            background: rgba(0, 0, 0, 0.1);
        }

        [data-theme="light"] .markdown-body th {
            color: #1a1a1a;
            background: rgba(0, 0, 0, 0.03);
        }

        [data-theme="light"] .markdown-body td {
            color: rgba(0, 0, 0, 0.7);
            border-bottom-color: rgba(0, 0, 0, 0.06);
        }

        [data-theme="light"] .markdown-body h1 {
            border-bottom-color: rgba(0, 0, 0, 0.1);
        }

        [data-theme="light"] .loading {
            color: rgba(0, 0, 0, 0.4);
        }

        [data-theme="light"] .grid-overlay {
            background-image: 
                linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
        }

        [data-theme="light"] .theme-toggle {
            background: rgba(0, 0, 0, 0.05);
            border-color: rgba(0, 0, 0, 0.12);
            color: rgba(0, 0, 0, 0.6);
        }

        [data-theme="light"] .theme-toggle:hover {
            background: rgba(0, 0, 0, 0.08);
            border-color: rgba(123, 47, 247, 0.5);
        }

        @media (prefers-color-scheme: light) {
            :root:not([data-theme="dark"]) body {
                background: #ffffff;
                color: #1a1a1a;
            }

            :root:not([data-theme="dark"]) .navbar {
                background: rgba(255, 255, 255, 0.95);
                border-bottom-color: rgba(0, 0, 0, 0.08);
            }

            :root:not([data-theme="dark"]) .nav-btn {
                color: rgba(0, 0, 0, 0.6);
                border-color: rgba(0, 0, 0, 0.12);
            }

            :root:not([data-theme="dark"]) .sidebar {
                background: rgba(0, 0, 0, 0.02);
                border-right-color: rgba(0, 0, 0, 0.08);
            }

            :root:not([data-theme="dark"]) .sidebar-title {
                color: rgba(0, 0, 0, 0.4);
            }

            :root:not([data-theme="dark"]) .sidebar-nav a {
                color: rgba(0, 0, 0, 0.6);
            }

            :root:not([data-theme="dark"]) .markdown-body h2 {
                color: #1a1a1a;
            }

            :root:not([data-theme="dark"]) .markdown-body h3 {
                color: rgba(0, 0, 0, 0.9);
            }

            :root:not([data-theme="dark"]) .markdown-body p,
            :root:not([data-theme="dark"]) .markdown-body li {
                color: rgba(0, 0, 0, 0.7);
            }

            :root:not([data-theme="dark"]) .markdown-body strong {
                color: #1a1a1a;
            }

            :root:not([data-theme="dark"]) .markdown-body th {
                color: #1a1a1a;
            }

            :root:not([data-theme="dark"]) .loading {
                color: rgba(0, 0, 0, 0.4);
            }

            :root:not([data-theme="dark"]) .grid-overlay {
                background-image: 
                    linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            }
        }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    
    <nav class="navbar">
        <a href="index.html" class="nav-logo">Synap</a>
        <div class="nav-btns">
            <a href="index.html" class="nav-btn">首页</a>
            <a href="download.html" class="nav-btn">下载</a>
            <a href="document.html" class="nav-btn active">文档</a>
        </div>
    </nav>

    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-title">文档目录</div>
            <ul class="sidebar-nav" id="sidebarNav">
            </ul>
        </aside>

        <main class="content">
            <div class="markdown-body" id="markdownContent">
                <div class="loading">加载中...</div>
            </div>
        </main>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
        <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        async function loadDocument() {
            try {
                const response = await fetch('document.md');
                if (!response.ok) throw new Error('加载失败');
                const markdown = await response.text();
                
                const html = marked.parse(markdown);
                document.getElementById('markdownContent').innerHTML = html;
                
                buildSidebar();
                setupScrollSpy();
            } catch (error) {
                document.getElementById('markdownContent').innerHTML = 
                    `<div class="error">加载失败: ${error.message}</div>`;
            }
        }

        function buildSidebar() {
            const headings = document.querySelectorAll('.markdown-body h1, .markdown-body h2, .markdown-body h3');
            const nav = document.getElementById('sidebarNav');
            
            headings.forEach((heading, index) => {
                const id = `heading-${index}`;
                heading.id = id;
                
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = `#${id}`;
                a.textContent = heading.textContent;
                a.dataset.level = heading.tagName.toLowerCase();
                
                if (heading.tagName === 'H3') {
                    a.style.paddingLeft = '2rem';
                    a.style.fontSize = '0.9rem';
                }
                
                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
                
                li.appendChild(a);
                nav.appendChild(li);
            });
        }

        function setupScrollSpy() {
            const headings = document.querySelectorAll('.markdown-body h1, .markdown-body h2, .markdown-body h3');
            const navLinks = document.querySelectorAll('.sidebar-nav a');
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        navLinks.forEach(link => link.classList.remove('active'));
                        const activeLink = document.querySelector(`.sidebar-nav a[href="#${entry.target.id}"]`);
                        if (activeLink) activeLink.classList.add('active');
                    }
                });
            }, { rootMargin: '-80px 0px -80% 0px' });
            
            headings.forEach(heading => observer.observe(heading));
        }

        loadDocument();

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                document.documentElement.setAttribute('data-theme', savedTheme);
            } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        }

        initTheme();
    </script>
</body>
</html>
